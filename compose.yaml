services:
  thymx:
    image: thymx:latest
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      SPRING_PROFILES_ACTIVE: default, docker, postgres, preprod, init
      JAVA_TOOL_OPTIONS: |
        -Dspring.aot.enabled=false
        -XX:+UseG1GC
        -XX:+UseStringDeduplication
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'wget -qO- localhost/actuator/health/liveness | grep -q "UP" || exit 1',
        ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:alpine
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER} | grep -q "accepting connections" || exit 1',
        ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  haproxy:
    image: haproxy:alpine
    deploy:
      resources:
        limits:
          memory: 128m
    restart: unless-stopped
    ports:
      - '443:443'
      - '80:80'
    depends_on:
      thymx:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'sh', '-c', 'pgrep haproxy || exit 1']
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - $PWD/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - $PWD/keystore/certs/external.combined.pem:/keystore/external.combined.pem:ro
