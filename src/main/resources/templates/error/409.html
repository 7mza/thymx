<!--/*@thymesVar id="url" type="kotlin.String"*/-->
<!doctype html>
<html
  layout:decorate="~{layouts/error_page}"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block layout:fragment="error_title">
      <div class="flex justify-center">
        <div class="join items-center space-x-8">
          <div class="join-item">
            <div class="inline-grid *:[grid-area:1/1]">
              <div class="status status-xl status-error animate-ping"></div>
              <div class="status status-xl status-error"></div>
            </div>
          </div>
          <div class="join-item space-y-4">
            <h1
              class="text-base-content text-2xl font-bold sm:text-3xl md:text-4xl"
              th:text="#{ui.conflict}"></h1>
            <div th:text="#{ui.conflict.details}"></div>
          </div>
        </div>
      </div>
    </th:block>
    <th:block layout:fragment="error_back">
      <div class="flex flex-row justify-between">
        <a th:replace="~{fragments/input :: back_button(${url})}"></a>
        <span></span>
      </div>
    </th:block>
  </body>
</html>
